<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BRNX CLAN — Candidatura</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #cc0000;
      --red-bright: #ff1a1a;
      --black: #080808;
      --black-mid: #111111;
      --black-card: #161616;
      --white: #f0f0f0;
      --grey: #888888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      background: var(--black-mid);
      border-bottom: 1px solid #1a1a1a;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--white);
      text-decoration: none;
    }
    .nav-logo span { color: var(--red-bright); }

    /* ── FORM CONTAINER ── */
    .form-container {
      max-width: 600px;
      margin: 4rem auto;
      padding: 2rem;
      background: var(--black-card);
      border: 1px solid #1a1a1a;
      position: relative;
    }

    .form-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 3px;
      background: var(--red);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    p.subtitle {
      text-align: center;
      color: var(--grey);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.9rem;
      margin-bottom: 3rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      color: var(--red-bright);
    }

    input, textarea {
      width: 100%;
      padding: 1rem;
      background: #0d0d0d;
      border: 1px solid #222;
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--red);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .btn-submit {
      width: 100%;
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      transition: background 0.3s, transform 0.2s;
      margin-top: 1rem;
    }

    .btn-submit:hover {
      background: var(--red-bright);
      transform: translateY(-2px);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">BRN<span>X</span></a>
    <a href="index.html" style="color: var(--grey); text-decoration: none; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em;">← Torna alla Home</a>
  </nav>

  <div class="form-container">
    <h1>Reclutamento</h1>
    <p class="subtitle">Dimostra il tuo valore</p>

    <form action="https://formspree.io/f/brnxclan.wz@gmail.com" method="POST">
      
      <div class="form-group">
        <label for="nickname">Nickname (In-game)</label>
        <input type="text" id="nickname" name="nickname" placeholder="Esempio: Ghost_BRNX" required>
      </div>

      <div class="form-group">
        <label for="age">Età Anagrafica</label>
        <input type="number" id="age" name="eta" placeholder="Quanti anni hai?" required>
      </div>

      <div class="form-group">
        <label for="playerid">ID Giocatore (Activision ID)</label>
        <input type="text" id="playerid" name="playerid" placeholder="User#1234567" required>
      </div>

      <div class="form-group">
        <label for="email">Indirizzo Email</label>
        <input type="email" id="email" name="_replyto" placeholder="tua@email.com" required>
      </div>

      <div class="form-group">
        <label for="reason">Perché vuoi entrare nei BRNX?</label>
        <textarea id="reason" name="messaggio" placeholder="Raccontaci la tua esperienza o le tue ambizioni..." required></textarea>
      </div>

      <input type="text" name="_gotcha" style="display:none">

      <button type="submit" class="btn-submit">Invia Candidatura</button>
    </form>
  </div>

  <footer>
    &copy; 2026 BRNX CLAN &nbsp;·&nbsp; SELEZIONI APERTE
  </footer>

</body>
</html>
