<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BRNX CLAN — Candidatura</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --red: #cc0000;
      --red-bright: #ff1a1a;
      --black: #080808;
      --black-mid: #111111;
      --black-card: #161616;
      --white: #f0f0f0;
      --grey: #888888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    nav {
      background: var(--black-mid);
      border-bottom: 1px solid #1a1a1a;
      padding: 1.2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--white);
      text-decoration: none;
    }
    .nav-logo span { color: var(--red-bright); }

    .form-container {
      max-width: 620px;
      margin: 5rem auto;
      padding: 3rem 2.5rem;
      background: var(--black-card);
      border: 1px solid #1a1a1a;
      position: relative;
    }

    .form-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(to right, var(--red), var(--red-bright));
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.2rem;
      letter-spacing: 0.05em;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      text-align: center;
      color: var(--grey);
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 0.95rem;
      margin-bottom: 3rem;
    }

    .form-group {
      margin-bottom: 1.8rem;
    }

    label {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
      color: var(--red-bright);
    }

    input, textarea {
      width: 100%;
      padding: 1rem 1.2rem;
      background: #0d0d0d;
      border: 1px solid #222;
      color: var(--white);
      font-size: 1.05rem;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(204, 0, 0, 0.15);
    }

    textarea { min-height: 130px; resize: vertical; }

    .privacy-group {
      margin: 2rem 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .privacy-group input[type="checkbox"] {
      width: auto;
      margin-top: 4px;
      accent-color: var(--red);
    }

    .privacy-text {
      font-size: 0.95rem;
      color: var(--grey);
      line-height: 1.5;
    }

    .btn-submit {
      width: 100%;
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 1.2rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .btn-submit:hover {
      background: var(--red-bright);
      transform: translateY(-3px);
    }

    footer {
      text-align: center;
      padding: 3rem 1rem 2rem;
      color: #444;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">BRN<span>X</span></a>
    <a href="index.html" style="color: var(--grey); text-decoration: none; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.1em;">← Torna alla Home</a>
  </nav>

  <div class="form-container">
    <h1>RECLUTAMENTO</h1>
    <p class="subtitle">Dimostra il tuo valore • Entra nel Clan</p>

    <form action="https://api.web3forms.com/submit" method="POST">
      
      <!-- Chiave pubblica Web3Forms (sostituiscila con la tua) -->
      <input type="hidden" name="access_key" value="INSERISCI_QUI_LA_TUA_ACCESS_KEY">

      <div class="form-group">
        <label for="nickname">Nickname (In-game)</label>
        <input type="text" id="nickname" name="nickname" placeholder="Esempio: Ghost_BRNX" required>
      </div>

      <div class="form-group">
        <label for="age">Età Anagrafica</label>
        <input type="number" id="age" name="eta" placeholder="Quanti anni hai?" min="14" required>
      </div>

      <div class="form-group">
        <label for="playerid">Activision ID</label>
        <input type="text" id="playerid" name="playerid" placeholder="User#1234567" required>
      </div>

      <div class="form-group">
        <label for="email">Indirizzo Email</label>
        <input type="email" id="email" name="email" placeholder="tua@email.com" required>
      </div>

      <div class="form-group">
        <label for="reason">Perché vuoi entrare nei BRNX?</label>
        <textarea id="reason" name="messaggio" placeholder="Raccontaci la tua esperienza, piattaforma, K/D medio..." required></textarea>
      </div>

      <!-- Privacy -->
      <div class="privacy-group">
        <input type="checkbox" id="privacy" required>
        <label for="privacy" class="privacy-text">
          Accetto il trattamento dei miei dati personali e dichiaro di aver letto il Regolamento del BRNX Clan.
        </label>
      </div>

      <button type="submit" class="btn-submit">INVIA CANDIDATURA</button>
    </form>
  </div>

  <footer>
    © 2026 BRNX CLAN &nbsp;·&nbsp; SELEZIONI APERTE — WARZONE ELITE DIVISION
  </footer>
</body>
</html>
